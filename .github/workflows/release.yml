name: Publish to NuGet

# Publishes WitSeal.AgentFramework to nuget.org via Trusted Publishing (OIDC) —
# no long-lived API key stored. Triggered by a version tag (vX.Y.Z) or manually.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required: lets GitHub issue the OIDC token for Trusted Publishing

jobs:
  publish:
    name: Pack + publish (Trusted Publishing)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack
        run: dotnet pack src/WitSeal.AgentFramework/WitSeal.AgentFramework.csproj -c Release -o artifacts

      # Exchange the GitHub OIDC token for a short-lived nuget.org API key (valid 1h).
      # NUGET_USER is your nuget.org username (profile name) — NOT your email.
      - name: NuGet login (OIDC -> temporary API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
